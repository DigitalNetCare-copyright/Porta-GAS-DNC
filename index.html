<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mengarahkan...</title>
    
    <!-- Ini adalah kod utama yang melakukan pengalihan (redirect) -->
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbxQMM84-He_rAQtVDAUuXPDVj0-d9GViPGiAH-4cxRx2wEDC3C1x382p0x-Ce6zfhquQw/exec">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f6f8fa;
            color: #24292f;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #0969da;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #0969da;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Sedang mengarahkan...</h2>
        <p>Jika anda tidak diarahkan secara automatik, sila <a href="https://script.google.com/macros/s/AKfycbxQMM84-He_rAQtVDAUuXPDVj0-d9GViPGiAH-4cxRx2wEDC3C1x382p0x-Ce6zfhquQw/exec">klik di sini</a>.</p>
    </div>
</body>
</html>
